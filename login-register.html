<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Fraud Shield | Secure Login</title>
    <link rel="stylesheet" href="login-register.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-bg"></div>
        <div class="floating-circles">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
    </div>

    <div class="container">
        <!-- Brand Section -->
        <div class="brand-section">
            <div class="brand-content">
                <div class="brand-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1 class="brand-title">UPI Fraud Shield</h1>
                <p class="brand-tagline">Protecting Your Digital Transactions</p>
                <div class="brand-features">
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Real-time Fraud Detection</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Instant Alerts & Notifications</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Advanced Security Protocols</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Login Form Section -->
        <div class="forms-section">
            <div class="form-container">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Login to your account</p>
                </div>
                
                <!-- User Type Selector - User/Admin Buttons -->
                <div class="user-type-selector">
                    <button type="button" class="user-type-btn active" data-type="user" id="userLoginBtn">
                        <i class="fas fa-user"></i>
                        <span>User</span>
                    </button>
                    <button type="button" class="user-type-btn" data-type="admin" id="adminLoginBtn">
                        <i class="fas fa-shield-alt"></i>
                        <span>Admin</span>
                    </button>
                </div>
                
                <form id="loginFormElement" class="form">
                    <div class="input-field">
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <input type="email" id="loginEmail" placeholder="Email Address" required autocomplete="off">
                        <div class="input-border"></div>
                    </div>
                    
                    <div class="input-field">
                        <div class="input-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                        <input type="password" id="loginPassword" placeholder="Password" required autocomplete="off">
                        <div class="input-border"></div>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" id="forgotPasswordLink" class="forgot-link">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="loginBtn">
                        <span>Login</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>
                
                <div class="form-footer">
                    <p>Don't have an account? <a href="user-register.html">Create Account</a></p>
                </div>
                
              

    <div id="toast" class="toast">
        <div class="toast-content">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script src="login-register.js"></script>
</body>
</html>
