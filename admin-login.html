<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | UPI Fraud Shield</title>
    <link rel="stylesheet" href="admin-login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="bg-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <div class="icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1>Admin Login</h1>
            <p>Secure access to admin dashboard</p>
            <span class="admin-tag">RESTRICTED AREA</span>
        </div>

        <div class="login-body">
            <form id="adminLoginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="adminEmail" placeholder="Admin Email Address" required autocomplete="off">
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="adminPassword" placeholder="Password" required>
                </div>

                <div class="login-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" id="forgotPassword" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Login as Admin</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="demo-box">
                <p class="title"><i class="fas fa-info-circle"></i> Demo Admin Credentials</p>
                <p><i class="fas fa-envelope"></i> admin@upishield.com</p>
                <p><i class="fas fa-key"></i> admin123456</p>
            </div>

            <div class="back-link">
                <a href="login-register.html"><i class="fas fa-arrow-left"></i> Back to User Login</a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="admin-login.js"></script>
</body>
</html>
