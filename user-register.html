<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Fraud Shield | User Registration</title>
    <link rel="stylesheet" href="user-register.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-bg"></div>
        <div class="floating-circles">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
    </div>

    <div class="container">
        <div class="brand-section">
            <div class="brand-content">
                <div class="brand-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1 class="brand-title">Create Account</h1>
                <p class="brand-tagline">Join UPI Fraud Shield Today</p>
                <div class="brand-features">
                    <div class="feature"><i class="fas fa-check-circle"></i><span>Real-time Fraud Detection</span></div>
                    <div class="feature"><i class="fas fa-check-circle"></i><span>Instant Transaction Alerts</span></div>
                    <div class="feature"><i class="fas fa-check-circle"></i><span>Secure Digital Payments</span></div>
                </div>
            </div>
        </div>

        <div class="forms-section">
            <div class="form-container">
                <div class="form-header">
                    <div class="user-icon"><i class="fas fa-user-circle"></i></div>
                    <h2>User Registration</h2>
                    <p>Please fill in your details to create an account</p>
                </div>
                
                <form id="userRegisterForm" class="form">
                    <div class="input-field">
                        <div class="input-icon"><i class="fas fa-user"></i></div>
                        <input type="text" id="regUsername" placeholder="Full Name" required>
                        <div class="input-border"></div>
                    </div>
                    
                    <div class="input-field">
                        <div class="input-icon"><i class="fas fa-envelope"></i></div>
                        <input type="email" id="regEmail" placeholder="Email Address" required>
                        <div class="input-border"></div>
                    </div>
                    
                    <div class="input-field">
                        <div class="input-icon"><i class="fas fa-lock"></i></div>
                        <input type="password" id="regPassword" placeholder="Password" required>
                        <div class="input-border"></div>
                        <div class="password-hint">Minimum 6 characters</div>
                    </div>
                    
                    <div class="input-field">
                        <div class="input-icon"><i class="fas fa-check-circle"></i></div>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
                        <div class="input-border"></div>
                    </div>
                    
                    <button type="submit" class="submit-btn">
                        <span>Create Account</span>
                        <i class="fas fa-user-plus"></i>
                    </button>
                </form>
                
                <div class="form-footer">
                    <p>Already have an account? <a href="login-register.html">Login Here</a></p>
                    <p class="back-link"><a href="login-register.html"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <div class="toast-content">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage"></span>
        </div>
    </div>

    <script src="user-register.js"></script>
</body>
</html>
